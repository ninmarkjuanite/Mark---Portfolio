<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nin Mark Juanite | Virtual Assistant Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      line-height: 1.6;
    }

    /* HERO */
    header {
      text-align: center;
      padding: 90px 20px;
      background: linear-gradient(135deg,#0f172a,#020617);
      position: relative;
      overflow: hidden;
    }

    header h1 {
      font-size: 3.2rem;
      font-weight: 700;
    }

    header p {
      color: #94a3b8;
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 6px 12px;
      background: #22c55e;
      color: #04120a;
      font-weight: 600;
      border-radius: 999px;
      font-size: 0.85rem;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 22px;
      border-radius: 10px;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #0ea5e9;
    }
</html>
